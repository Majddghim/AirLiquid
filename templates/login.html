<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login - Air Liquide</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap for utility classes -->
    <link rel="stylesheet" href="/static/assets/bootstrap/css/bootstrap.min.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="/static/assets/fonts/fontawesome-all.min.css">
    <!-- Custom Login Styles -->
    <link rel="stylesheet" href="/static/css/login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <!-- Air Liquide Logo -->
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Air_Liquide_logo.svg/320px-Air_Liquide_logo.svg.png"
                    alt="Air Liquide Logo">
            </div>

            <h4 class="login-title">Identification</h4>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input class="form-control" type="email" id="email" placeholder="votre@email.com" name="email"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input class="form-control" type="password" id="password" placeholder="••••••••" name="password"
                        required>
                </div>

                <div class="mb-3 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">Se souvenir de moi</label>
                    </div>
                    <a class="small" href="forgot-password.html" style="color: var(--primary-color);">Oubli ?</a>
                </div>

                <button class="btn-login" type="button" id="loginBtn" onclick="handleLogin()">
                    Se connecter
                </button>
            </form>

            <div class="footer-links">
                <p class="text-muted mb-0">© 2026 Air Liquide. Tous droits réservés.</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="/static/js/elements/Notifications.js"></script>
    <script src="/static/js/auth.js"></script>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                const notifs = new Notifications();
                notifs.error("Champs requis", "Veuillez remplir tous les champs.");
                return;
            }

            btn.classList.add('loading');
            login_request(email, password);
        }
    </script>
</body>

</html>
