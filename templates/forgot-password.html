<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Forgot Password - Air Liquide</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="/static/assets/bootstrap/css/bootstrap.min.css">
    <!-- Custom Login Styles -->
    <link rel="stylesheet" href="/static/css/login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Air_Liquide_logo.svg/320px-Air_Liquide_logo.svg.png"
                    alt="Air Liquide Logo">
            </div>

            <h4 class="login-title">Mot de passe oublié ?</h4>
            <p class="text-muted small mb-4">Entrez votre adresse e-mail et nous vous enverrons un lien pour
                réinitialiser votre mot de passe.</p>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input class="form-control" type="email" id="email" placeholder="votre@email.com" name="email"
                        required>
                </div>

                <button class="btn-login" type="submit">
                    Réinitialiser le mot de passe
                </button>
            </form>

            <div class="footer-links">
                <a class="small" href="login.html" style="color: var(--primary-color);">Retour à la connexion</a>
                <hr>
                <p class="text-muted mb-0">© 2026 Air Liquide. Tous droits réservés.</p>
            </div>
        </div>
    </div>
</body>

</html>
