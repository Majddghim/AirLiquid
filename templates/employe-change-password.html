<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ALT Fleet — Changer le mot de passe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/fonts/fontawesome-all.min.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; font-family: 'Nunito', sans-serif;
        }
        .card {
            border-radius: 20px; padding: 40px 30px;
            width: 100%; max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .form-control {
            border-radius: 10px; padding: 12px 15px;
            border: 2px solid #e9ecef; font-size: 15px;
        }
        .form-control:focus { border-color: #0d6efd; box-shadow: none; }
        .btn-save {
            background: linear-gradient(135deg, #198754, #157347);
            border: none; border-radius: 10px; padding: 14px;
            font-size: 16px; font-weight: 700; width: 100%; color: white;
        }
        .error-msg {
            background: #fff5f5; border: 1px solid #fed7d7;
            color: #c53030; border-radius: 8px;
            padding: 10px 15px; font-size: 14px; display: none;
        }
    </style>
</head>
<body>
    <div class="card bg-white">
        <div class="text-center mb-4">
            <div style="width:60px;height:60px;background:linear-gradient(135deg,#198754,#157347);
                border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;">
                <i class="fas fa-lock text-white fa-lg"></i>
            </div>
            <h5 class="fw-bold text-dark">Changer le mot de passe</h5>
            <p class="text-muted small">Veuillez définir un nouveau mot de passe pour continuer.</p>
        </div>

        <div class="error-msg mb-3" id="error_msg"></div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Nouveau mot de passe</label>
            <input type="password" class="form-control" id="new_password"
                placeholder="Minimum 6 caractères">
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">Confirmer le mot de passe</label>
            <input type="password" class="form-control" id="confirm_password"
                placeholder="Répéter le mot de passe">
        </div>

        <button class="btn-save" onclick="changePassword()" id="save_btn">
            <i class="fas fa-save me-2"></i>Enregistrer
        </button>
    </div>

    <script>
    async function changePassword() {
        const newPwd  = document.getElementById('new_password').value;
        const confirm = document.getElementById('confirm_password').value;
        const btn     = document.getElementById('save_btn');
        const err     = document.getElementById('error_msg');

        err.style.display = 'none';

        if (!newPwd || !confirm) {
            err.innerText = 'Veuillez remplir tous les champs.';
            err.style.display = 'block'; return;
        }
        if (newPwd.length < 6) {
            err.innerText = 'Mot de passe trop court (6 caractères minimum).';
            err.style.display = 'block'; return;
        }
        if (newPwd !== confirm) {
            err.innerText = 'Les mots de passe ne correspondent pas.';
            err.style.display = 'block'; return;
        }

        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Enregistrement...';
        btn.disabled  = true;

        try {
            const res    = await fetch('/employe/change-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_password: newPwd, confirm_password: confirm })
            });
            const result = await res.json();

            if (result.status === 'success') {
                window.location.href = result.redirect;
            } else {
                err.innerText     = result.message;
                err.style.display = 'block';
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Enregistrer';
                btn.disabled  = false;
            }
        } catch (e) {
            err.innerText     = 'Erreur réseau.';
            err.style.display = 'block';
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Enregistrer';
            btn.disabled  = false;
        }
    }
    </script>
</body>
</html>
