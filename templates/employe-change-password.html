<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALT Fleet — Nouveau mot de passe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/fonts/fontawesome-all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/employe.css') }}">
</head>
<body class="auth-body">

    <div class="auth-card">
        <div class="auth-logo" style="background: linear-gradient(135deg, #198754, #157347); box-shadow: 0 8px 20px rgba(25,135,84,0.4);">
            <i class="fas fa-lock text-white fa-lg"></i>
        </div>
        <div class="auth-title">Nouveau mot de passe</div>
        <div class="auth-subtitle">Définissez un mot de passe sécurisé pour votre compte.</div>

        <div class="error-box" id="error_msg"></div>

        <div class="auth-input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="new_password" placeholder="Nouveau mot de passe (6 caractères min.)">
        </div>

        <div class="auth-input-group">
            <i class="fas fa-check-circle input-icon"></i>
            <input type="password" id="confirm_password" placeholder="Confirmer le mot de passe">
        </div>

        <button class="auth-btn green" onclick="changePassword()" id="save_btn">
            <i class="fas fa-save me-2"></i>Enregistrer
        </button>

        <div class="auth-footer">Air Liquide Tunisia © 2026</div>
    </div>

    <script src="{{ url_for('static', filename='assets/bootstrap/js/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/employe-change-password.js') }}"></script>
</body>
</html>
