<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Voitures - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i&amp;display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/branding.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/fonts/fontawesome-all.min.css') }}">
</head>

<body id="page-top" onload="initPage()">
    <div id="wrapper">

        {% include 'elements/side-bar/side-bar.html' %}

        <div class="d-flex flex-column" id="content-wrapper">
            <div id="content">

                <nav class="navbar navbar-expand bg-white shadow mb-4 topbar">
                    {% include 'elements/header/header.html' %}
                </nav>

                <div class="container-fluid">

                    <!-- Title + Add Car Button -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="text-dark mb-0">Liste des Voitures</h3>

                        <a href="/dashboard/ajout-voiture" class="btn btn-primary">
                            <i class="fas fa-plus"></i> Ajouter Voiture
                        </a>
                    </div>

                    <div class="card shadow border-0">
                        <div class="card-header py-3 bg-white d-flex justify-content-between align-items-center">
                            <h6 class="text-primary fw-bold m-0"><i class="fas fa-car me-2"></i>Gestion de la Flotte
                            </h6>
                            <div class="dataTables_filter d-none d-md-block" id="dataTable_filter">
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text bg-light border-0"><i
                                            class="fas fa-search"></i></span>
                                    <input type="search" class="form-control form-control-sm bg-light border-0"
                                        id="search_by_name" placeholder="Recherche rapide...">
                                </div>
                            </div>
                        </div>

                        <div class="card-body">
                            <!-- Cars Table -->
                            <div class="table-responsive" id="dataTable-container" role="grid">
                                <table class="table table-hover align-middle my-0" id="dataTable">
                                    <thead class="table-light">
                                        <tr class="text-xs text-uppercase text-muted">
                                            <th>Véhicule</th>
                                            <th>Immatriculation</th>
                                            <th>Propriétaire</th>
                                            <th>Infos Techniques</th>
                                            <th class="text-center">Statut</th>
                                            <th>Administration</th>
                                            <th class="text-end">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <!-- Loaded dynamically by car.js -->
                                    </tbody>
                                </table>
                            </div>

                            <!-- Pagination Controls -->
                            <div class="row mt-4">
                                <div class="col-md-6 align-self-center">
                                    <p id="dataTable_info" class="dataTables_info" role="status" aria-live="polite"></p>
                                </div>
                                <div class="col-md-6">
                                    <nav
                                        class="d-lg-flex justify-content-lg-end dataTables_paginate paging_simple_numbers">
                                        <ul class="pagination" id="data-pagination">
                                            <!-- Pagination buttons injected by script.js -->
                                        </ul>
                                    </nav>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="bg-white sticky-footer">
                <div class="container my-auto">
                    <div class="text-center my-auto copyright">
                        <span>Copyright © Brand 2025</span>
                    </div>
                </div>
            </footer>

        </div>

        <a class="border rounded d-inline scroll-to-top" href="#page-top"><i class="fas fa-angle-up"></i></a>
    </div>

    <script src="{{ url_for('static', filename='js/car.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/bootstrap/js/bootstrap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/js/bs-init.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/elements/Notifications.js') }}"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
