    </form>

    <ul class="navbar-nav flex-nowrap ms-auto">

        <!-- Mobile search -->
        <li class="nav-item dropdown d-sm-none no-arrow">
            <a class="dropdown-toggle nav-link" aria-expanded="false" data-bs-toggle="dropdown" href="#">
                <i class="fas fa-search"></i>
            </a>
            <div class="dropdown-menu dropdown-menu-end p-3 animated--grow-in">
                <form class="me-auto navbar-search w-100">
                    <div class="input-group">

                        <button class="btn btn-primary" type="button"><i class="fas fa-search"></i></button>
                    </div>

            </div>

        <!-- ============================================================ -->
        <!-- ALERTS BELL — wired to real data                              -->
        <!-- ============================================================ -->
        <li class="nav-item dropdown no-arrow mx-1">
            <a class="dropdown-toggle nav-link" aria-expanded="false"
                data-bs-toggle="dropdown" href="#" id="alertsDropdownToggle">

            <div class="dropdown-menu dropdown-menu-end dropdown-list animated--grow-in" style="min-width:340px;">
                <h6 class="dropdown-header d-flex justify-content-between align-items-center">
                    <span>Alertes</span>
                    <span class="badge bg-danger rounded-pill" id="alert_header_count"></span>
                </h6>
                <div id="alerts_dropdown_list">
                    <div class="dropdown-item text-center text-muted small py-3">

                    </div>
                </div>
                <a class="dropdown-item text-center small text-primary fw-bold py-2"
                    href="/dashboard/">

        <!-- Messages (kept as-is) -->
        <li class="nav-item dropdown no-arrow mx-1">

                <a class="dropdown-toggle nav-link" aria-expanded="false" data-bs-toggle="dropdown" href="#">
                    <span class="badge bg-danger badge-counter">7</span>

<script>
// Load alerts on every page for the bell icon
async function loadHeaderAlerts() {
    try {
        const res  = await fetch('/dashboard/api/alerts?days=30');
        const data = await res.json();
        if (data.status !== 'success') return;

        const alerts = data.data;
        const count  = alerts.length;

        // update badge
        const badge = document.getElementById('alert_badge');
        if (count > 0) {
            badge.classList.remove('d-none');
            badge.innerText = count > 9 ? '9+' : count;
        }
        document.getElementById('alert_header_count').innerText = count;

        // fill dropdown — show max 4
        const list    = document.getElementById('alerts_dropdown_list');
        const preview = alerts.slice(0, 4);

        if (preview.length === 0) {
            list.innerHTML = `<div class="dropdown-item text-center text-muted small py-3">
                <i class="fas fa-check-circle text-success me-1"></i> Aucune alerte active
            </div>`;
            return;
        }

        list.innerHTML = preview.map(a => {
            const icon  = a.level === 'danger' ? 'bg-danger' : 'bg-warning';
            const itype = a.type === 'incomplete' ? 'fa-folder-open' : 'fa-exclamation-triangle';
            const sub   = a.type === 'expired'    ? 'Expiré'
                        : a.type === 'expiry'     ? `Expire dans ${a.days}j`
                        : 'Dossier incomplet';
            return `
            <a class="dropdown-item d-flex align-items-center py-2" href="/car/detail/${a.car_id}">
                <div class="me-3">
                    <div class="${icon} icon-circle">
                        <i class="fas ${itype} text-white"></i>
                    </div>
                </div>
                <div>
                    <div class="small fw-bold">${a.doc} — ${a.car}</div>
                    <span class="small text-muted">${sub}</span>
                </div>
            </a>`;
        }).join('');

    } catch (e) {
        console.error('loadHeaderAlerts error:', e);
    }
}

document.addEventListener('DOMContentLoaded', loadHeaderAlerts);
</script>
