<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Email — ALT Fleet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/branding.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/fonts/fontawesome-all.min.css') }}">
</head>
<body id="page-top">
<div id="wrapper">
    {% include 'elements/side-bar/side-bar.html' %}
    <div class="d-flex flex-column" id="content-wrapper">
        <div id="content">
            <nav class="navbar navbar-expand bg-white shadow mb-4 topbar">
                {% include 'elements/header/header.html' %}
            </nav>

            <div class="container-fluid">

                <!-- Back button -->
                <div class="mb-4">
                    <a href="/dashboard/" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-arrow-left me-1"></i>Retour au Dashboard
                    </a>
                </div>

                <!-- Email card -->
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card shadow border-0">

                            <!-- Email header -->
                            <div class="card-header bg-white py-4 px-4">
                                <div class="d-flex align-items-start gap-3">
                                    <div class="bg-primary bg-opacity-10 p-3 rounded">
                                        <i class="fas fa-envelope text-primary fa-lg"></i>
                                    </div>
                                    <div class="flex-grow-1">
                                        <h5 class="fw-bold text-dark mb-2" id="email_subject">—</h5>
                                        <div class="text-muted small">
                                            <i class="fas fa-user me-1"></i>
                                            <span id="email_sender">—</span>
                                        </div>
                                        <div class="text-muted small mt-1">
                                            <i class="fas fa-calendar me-1"></i>
                                            <span id="email_date">—</span>
                                        </div>
                                    </div>
                                    <span class="badge bg-primary-subtle text-primary">
                                        <i class="fab fa-google me-1"></i>Gmail
                                    </span>
                                </div>
                            </div>

                            <!-- Divider -->
                            <hr class="m-0">

                            <!-- Email body -->
                            <div class="card-body px-4 py-4">
                                <div id="email_body"
    style="font-size:14px;line-height:1.8;color:#2d3748;">
                                    Chargement...
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>

        <footer class="bg-white sticky-footer">
            <div class="container my-auto">
                <div class="text-center my-auto copyright">
                    <span>Copyright © ALT 2025</span>
                </div>
            </div>
        </footer>
    </div>
</div>

<script src="{{ url_for('static', filename='assets/bootstrap/js/bootstrap.min.js') }}"></script>
<script src="{{ url_for('static', filename='assets/js/bs-init.js') }}"></script>
<script src="{{ url_for('static', filename='assets/js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/elements/Notifications.js') }}"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/gmail-email.js') }}"></script>
</body>
</html>
